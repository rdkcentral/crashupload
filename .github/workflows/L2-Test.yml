name: L2 Functional Tests

on:
  pull_request:
    branches: [ develop, main ]

env:
  AUTOMATICS_UNAME: ${{ secrets.AUTOMATICS_UNAME }}
  AUTOMATICS_PASSCODE: ${{ secrets.AUTOMATICS_PASSCODE }}

jobs:
  execute-L2-tests-on-pr:
    name: Execute L2 functional test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull docker images
        run: |
          docker pull ghcr.io/rdkcentral/docker-device-mgt-service-test/mockxconf:latest
          docker pull ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:latest

      - name: Start mockxconf container
        run: |
          docker run -d --name mockxconf \
            -p 50050:50050 -p 50051:50051 -p 50052:50052 -p 50053:50053 \
            -p 50056:50056 -p 50057:50057 -p 50058:50058 \
            -p 50059:50059 -p 50060:50060 \
            -v ${{ github.workspace }}:/mnt/L2_CONTAINER_SHARED_VOLUME \
            ghcr.io/rdkcentral/docker-device-mgt-service-test/mockxconf:latest

      - name: Deploy and start crashUpload.js mock server
        run: |
          echo "Waiting for mockxconf container to be ready..."
          sleep 5
          
          echo "Copying crashUpload.js to container..."
          docker cp ${{ github.workspace }}/test/crashUpload.js mockxconf:/usr/local/bin/crashUpload.js
          
          echo "Making crashUpload.js executable..."
          docker exec mockxconf chmod +x /usr/local/bin/crashUpload.js
          
          echo "Starting crashUpload.js server..."
          docker exec -d mockxconf sh -c "cd /usr/local/bin && node crashUpload.js > /tmp/crashUpload.log 2>&1"
          
          echo "Waiting for crashUpload.js to start..."
          sleep 5
          
          echo "Verifying crashUpload.js process..."
          docker exec mockxconf ps aux | grep -E "node.*crashUpload"
          echo "✓ crashUpload.js process is running"
          
          echo "Checking if ports are listening..."
          docker exec mockxconf netstat -tuln | grep -E ":(50059|50060)" || echo "Warning: Ports may not be listening yet"
          
          echo "Testing connectivity from native-platform..."
          docker exec mockxconf curl -k -I https://localhost:50059/admin/crashUpload || echo "Warning: Server may not be ready yet"
          
          echo "Waiting additional time for server to be fully ready..."
          sleep 10

      - name: Start native-platform container
        run: |
          docker run -d --name native-platform \
            --link mockxconf \
            -v ${{ github.workspace }}:/mnt/L2_CONTAINER_SHARED_VOLUME \
            ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:latest

      - name: Build crashupload and run L2 tests
        run: |
          docker exec -i native-platform /bin/bash -c "cd /mnt/L2_CONTAINER_SHARED_VOLUME/ && chmod +x cov_build.sh run_l2.sh && sh cov_build.sh && export LD_LIBRARY_PATH=\$LD_LIBRARY_PATH:/usr/lib/x86_64-linux-gnu:/lib/aarch64-linux-gnu:/usr/local/lib: && sh run_l2.sh"

      - name: Copy L2 test results to runner
        run: |
          docker cp native-platform:/tmp/l2_test_report /tmp/L2_TEST_RESULTS
          echo "L2 test results:"
          ls -l /tmp/L2_TEST_RESULTS

  upload-test-results:
    name: Upload L2 test results to automatic test result management system
    needs: execute-L2-tests-on-pr
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rdkcentral/docker-rdk-ci:latest
      volumes:
        - /tmp/L2_TEST_RESULTS:/tmp/L2_TEST_RESULTS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload results
        if: github.repository_owner == 'rdkcentral'
        run: |
          echo "Contents in workspace directory:"
          ls -l
          echo "==============================="
          echo "Contents in /tmp/L2_TEST_RESULTS:"
          ls -l /tmp/L2_TEST_RESULTS
          echo "==============================="
          git config --global --add safe.directory `pwd`
          gtest-json-result-push.py /tmp/L2_TEST_RESULTS https://rdkeorchestrationservice.apps.cloud.comcast.net/rdke_orchestration_api/push_unit_test_results `pwd`
